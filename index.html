<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metasurfing Books — On Hold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #1a1a1a;
      --dark: #f5f5f5;
      --sand: #555555;
      --muted: rgba(0,0,0,0.4);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--cream);
    }

    /* ════════════════════════════════
       BACKGROUND — animated ocean gradient
    ════════════════════════════════ */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, #e0e0e0 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, #e8e8e8 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, #ebebeb 0%, transparent 60%),
        #f5f5f5;
      animation: breathe 8s ease-in-out infinite alternate;
    }

    @keyframes breathe {
      from { opacity: 1; }
      to   { opacity: 0.85; }
    }

    /* ════════════════════════════════
       BOOK COVERS — background, blurred
    ════════════════════════════════ */
    .books-bg {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 74vw;
      height: 88vh;
      z-index: 1;
      background: linear-gradient(175deg, #d8d8d8 0%, #c8c8c8 40%, #b8b8b8 100%);
    }

    .books-blur {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 2;
      pointer-events: none;
      mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 40%, transparent 80%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 40%, transparent 80%);
    }

    /* dark vignette over books */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      background:
        linear-gradient(to top, rgba(245,245,245,0.6) 0%, transparent 30%),
        linear-gradient(to bottom, rgba(245,245,245,0.6) 0%, transparent 25%);
      pointer-events: none;
    }

    /* ════════════════════════════════
       MAIN LAYOUT
    ════════════════════════════════ */
    .page {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 48px 60px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-logo img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: grayscale(100%) brightness(2);
    }

    .topbar-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .topbar-right {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── CENTER ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    .center-logo {
      width: 240px;
      height: 240px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.2s;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--sand);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.4s;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(56px, 9vw, 130px);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.6s;
    }

    .headline em {
      font-style: italic;
      color: var(--sand);
    }

    .rule {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--sand), transparent);
      margin: 32px auto;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.9s;
    }

    .nav-list {
      display: flex;
      align-items: center;
      gap: 0;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.1s;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-list a {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sand);
      text-decoration: none;
      padding: 0 18px;
      transition: color 0.2s;
    }

    .nav-list a:hover { color: var(--cream); }

    .nav-sep {
      width: 1px;
      height: 10px;
      background: var(--sand);
      opacity: 0.35;
    }

    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 2.2vw, 22px);
      font-weight: 300;
      font-style: italic;
      color: rgba(240,235,227,0.55);
      letter-spacing: 0.04em;
      max-width: 480px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.1s;
    }


    /* ── BOTTOM BAR ── */
    .bottombar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .bottombar-left {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240,235,227,0.2);
    }

    .bottombar-right {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: rgba(0,0,0,0.2);
      letter-spacing: 0.05em;
    }

    .instagram {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.4s;
      transition: opacity 0.2s;
    }

    .instagram:hover { opacity: 0.7 !important; }

    .instagram svg {
      width: 18px;
      height: 18px;
      color: var(--sand);
    }

    .instagram span {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--sand);
    }

    /* ════════════════════════════════
       MOBILE
    ════════════════════════════════ */
    @media (max-width: 600px) {
      html, body { overflow-y: auto; height: auto; }

      .page {
        height: auto;
        min-height: 100vh;
        padding: 32px 24px 28px;
      }

      .books-bg {
        width: 100vw;
        height: 75vh;
      }

      .topbar-name { font-size: 9px; letter-spacing: 0.25em; }
      .topbar-right { font-size: 9px; letter-spacing: 0.2em; }

      .center-logo { width: 160px; height: 160px; margin-bottom: 20px; }

      .eyebrow { font-size: 9px; letter-spacing: 0.35em; margin-bottom: 22px; }

      .headline { font-size: clamp(52px, 16vw, 80px); }

      .rule { margin: 22px auto; height: 30px; }

      .nav-list {
        gap: 0;
        row-gap: 14px;
      }

      .nav-list a {
        font-size: 8px;
        padding: 0 10px;
        letter-spacing: 0.25em;
      }

      .nav-sep { height: 8px; }

      .bottombar {
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding-top: 32px;
      }

      .bottombar-left, .bottombar-right { font-size: 9px; }

      .instagram span { font-size: 10px; }
    }

    /* ════════════════════════════════
       ANIMATIONS
    ════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="books-bg"></div>
  <div class="books-blur"></div>
  <div class="vignette"></div>

  <!-- Page layout -->
  <div class="page">

    <!-- Top -->
    <header class="topbar">
      <span class="topbar-name">Metasurfing Books</span>
      <span class="topbar-right">Since 2006</span>
    </header>

    <!-- Center -->
    <main class="center">
      <svg class="center-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- outer circle -->
        <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(0,0,0,0.7)" stroke-width="2.5"/>
        <!-- big M -->
        <text x="100" y="138" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="118" font-weight="300" fill="rgba(30,30,30,0.9)" letter-spacing="-2">M</text>
        <!-- gray band -->
        <rect x="6" y="88" width="188" height="28" fill="rgba(0,0,0,0.08)"/>
        <!-- METASURFING BOOKS -->
        <text x="100" y="107" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" font-weight="300" fill="rgba(20,20,20,0.9)" letter-spacing="4">METASURFING BOOKS</text>
        <!-- Since 2006 -->
        <text x="100" y="162" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-weight="300" fill="rgba(0,0,0,0.5)" letter-spacing="1">Since 2006</text>
        <!-- copyright -->
        <text x="136" y="148" font-family="Inter, sans-serif" font-size="7" fill="rgba(0,0,0,0.4)">©</text>
      </svg>
      <span class="eyebrow">Publishing since 2006</span>
      <h1 class="headline">
        On <em>Hold</em>
      </h1>
      <div class="rule"></div>
      <nav class="nav-list">
        <a href="#">Home</a>
        <div class="nav-sep"></div>
        <a href="#">Surfcoaching Mag</a>
        <div class="nav-sep"></div>
        <a href="#">Surfschool Mag</a>
        <div class="nav-sep"></div>
        <a href="#">Shop</a>
        <div class="nav-sep"></div>
        <a href="#">Papers</a>
        <div class="nav-sep"></div>
        <a href="#">Premium Business</a>
      </nav>
    </main>

    <!-- Bottom -->
    <footer class="bottombar">
      <span class="bottombar-left">© 2026 Metasurfing Books</span>
      <a class="instagram" href="https://www.instagram.com/metasurfing.books" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        <span>metasurfing.books</span>
      </a>
      <span class="bottombar-right">The art of surfing, on paper.</span>
    </footer>

  </div>

</body>
</html>
